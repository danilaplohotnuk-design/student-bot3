<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Адмін · Розклад</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0f1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-page">
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-inner">
        <h1 class="app-title">Адмін-панель</h1>
        <p class="app-subtitle">Редагування розкладу</p>
      </div>
    </header>

    <section id="admin-auth" class="admin-section">
      <div class="form-row">
        <label for="admin-password">Пароль</label>
        <input type="password" id="admin-password" placeholder="Введіть адмін-пароль" />
      </div>
      <button type="button" id="admin-login-btn" class="btn-primary">Увійти</button>
      <p id="admin-status" class="admin-status"></p>
    </section>

    <section id="admin-form" class="admin-section" style="display: none;">
      <h2>Додати пару</h2>
      <div class="form-row">
        <label for="date">Дата</label>
        <input type="date" id="date" />
      </div>
      <div class="form-row">
        <label for="startTime">Початок</label>
        <input type="time" id="startTime" />
      </div>
      <div class="form-row">
        <label for="endTime">Кінець</label>
        <input type="time" id="endTime" />
      </div>
      <div class="form-row">
        <label for="title">Назва предмету</label>
        <input type="text" id="title" placeholder="Наприклад: Майстерність актора" />
      </div>
      <div class="form-row">
        <label for="teacher">Викладач (необовʼязково)</label>
        <input type="text" id="teacher" placeholder="ПІБ викладача" />
      </div>
      <div class="form-row">
        <label for="building">Корпус</label>
        <input type="text" id="building" placeholder="1 або 2" />
      </div>
      <div class="form-row">
        <label for="room">Аудиторія</label>
        <input type="text" id="room" placeholder="Номер аудиторії" />
      </div>
      <button type="button" id="add-lesson-btn" class="btn-primary">Зберегти пару</button>
      <p id="admin-message" class="admin-message"></p>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
