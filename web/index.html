<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Розклад занять</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0f1a" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-inner">
        <h1 class="app-title">Розклад</h1>
        <p class="app-subtitle" id="date-label">Оберіть дату</p>
      </div>
    </header>

    <section class="date-section">
      <div class="date-picker-wrap">
        <label for="date-input" class="date-label">Дата</label>
        <input type="date" id="date-input" class="date-input" />
      </div>
      <div class="date-quick-btns">
        <button type="button" id="today-btn" class="btn-quick">Сьогодні</button>
        <button type="button" id="tomorrow-btn" class="btn-quick">Завтра</button>
      </div>
    </section>

    <main id="schedule" class="schedule-list"></main>

    <footer class="app-footer">
      <span class="app-footer-text">Розклад для студентів</span>
      <button type="button" id="bg-btn" class="btn-bg" title="Фон">Фон</button>
      <div class="app-footer-version-wrap">
        <span id="app-version" class="app-footer-version" aria-label="Версія додатку"></span>
        <button type="button" id="version-secret-trigger" class="version-secret-trigger" tabindex="-1" aria-hidden="true" title=""></button>
      </div>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
