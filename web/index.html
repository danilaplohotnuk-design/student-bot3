<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Розклад занять</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f18" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-tba-watermark" aria-hidden="true">ТБА</div>
  <div class="app-shell" id="app-shell">
    <div id="schedule-view" class="schedule-view">
    <header class="app-header">
      <button
        type="button"
        id="header-weather-btn"
        class="app-header-btn"
        aria-label="Відкрити прогноз погоди на тиждень"
      >
        <span class="app-header-btn__inner">
          <span class="app-header-btn__schedule">
            <span class="app-title">Розклад</span>
            <span class="app-subtitle" id="date-label">Оберіть дату</span>
          </span>
          <span class="app-header-btn__weather-label">Погода</span>
        </span>
      </button>
    </header>

    <section class="date-section">
      <div class="date-picker-wrap">
        <label for="date-input" class="date-label">Дата</label>
        <input type="date" id="date-input" class="date-input" />
      </div>
      <div class="date-quick-btns">
        <button type="button" id="today-btn" class="btn-quick">Сьогодні</button>
        <button type="button" id="tomorrow-btn" class="btn-quick">Завтра</button>
      </div>
    </section>

    <div
      id="birthday-home-notice"
      class="birthday-home-notice"
      hidden
      role="button"
      tabindex="0"
      aria-label="Відкрити сторінку днів народження"
    >
      <div class="birthday-home-notice__inner" id="birthday-home-notice-inner"></div>
      <span class="birthday-home-notice__hint">Натисніть, щоб переглянути всі дні народження</span>
    </div>

    <div id="admin-mode-banner" class="admin-mode-banner" hidden>
      <p class="admin-mode-banner-title">Режим редагування</p>
      <div class="admin-mode-banner-rule" aria-hidden="true"></div>
    </div>

    <main class="schedule-main">
      <div id="schedule" class="schedule-list"></div>
      <div id="admin-exit-strip" class="admin-exit-strip lesson-card lesson-card--admin-exit" hidden>
        <button type="button" id="admin-exit-btn" class="admin-exit-btn" aria-label="Вийти з режиму редагування">
          <span class="admin-exit-label">Вийти</span>
        </button>
      </div>
      <div class="schedule-main-spacer" aria-hidden="true"></div>
    </main>

    <footer class="app-footer">
      <span class="app-footer-text">Розклад для студентів</span>
      <div class="app-footer-actions">
        <button type="button" id="birthdays-btn" class="btn-bg" title="Дні народження" aria-label="Усі дні народження">
          ДН
        </button>
        <button type="button" id="bg-btn" class="btn-bg" title="Фон">Фон</button>
      </div>
      <div class="app-footer-version-wrap">
        <span id="app-version" class="app-footer-version" aria-label="Версія додатку"></span>
        <button type="button" id="version-secret-trigger" class="version-secret-trigger" tabindex="-1" aria-hidden="true" title=""></button>
      </div>
    </footer>
    </div>

    <section id="birthdays-page" class="birthdays-page" hidden aria-label="Дні народження">
      <header class="birthdays-page__header">
        <button type="button" id="birthdays-back-btn" class="birthdays-page__back btn-bg" aria-label="Назад до розкладу">
          ← Назад
        </button>
        <h1 class="birthdays-page__title">Дні народження</h1>
      </header>

      <div id="birthdays-admin-panel" class="birthdays-admin-panel" hidden>
        <p class="birthdays-admin-panel__title">Додати день народження</p>
        <div class="birthdays-admin-form">
          <div class="birthdays-admin-form__row">
            <label class="birthdays-admin-label">
              <span class="birthdays-admin-label__text">День</span>
              <input
                type="number"
                id="birthdays-admin-day"
                class="birthdays-admin-input"
                min="1"
                max="31"
                inputmode="numeric"
                placeholder="1–31"
                autocomplete="off"
              />
            </label>
            <label class="birthdays-admin-label">
              <span class="birthdays-admin-label__text">Місяць</span>
              <input
                type="number"
                id="birthdays-admin-month"
                class="birthdays-admin-input"
                min="1"
                max="12"
                inputmode="numeric"
                placeholder="1–12"
                autocomplete="off"
              />
            </label>
            <label class="birthdays-admin-label birthdays-admin-label--grow">
              <span class="birthdays-admin-label__text">Прізвище та імʼя</span>
              <input
                type="text"
                id="birthdays-admin-name"
                class="birthdays-admin-input"
                maxlength="200"
                placeholder="Наприклад: Шевченко Тарас"
                autocomplete="name"
              />
            </label>
          </div>
          <button type="button" id="birthdays-admin-add" class="modal-btn modal-btn-primary birthdays-admin-add-btn">
            Додати
          </button>
        </div>
        <p id="birthdays-admin-error" class="modal-error birthdays-admin-error" style="display: none"></p>
      </div>

      <div id="birthdays-page-upcoming" class="birthdays-page__upcoming" hidden></div>
      <div id="birthdays-page-list" class="birthdays-page__list birthdays-list" role="list"></div>
    </section>

    <section id="weather-page" class="weather-page" hidden aria-label="Погода">
      <header class="weather-page__header">
        <button type="button" id="weather-back-btn" class="weather-page__back btn-bg" aria-label="Назад до розкладу">
          ← Назад
        </button>
        <h1 id="weather-page-title" class="weather-page__title">Погода</h1>
        <p id="weather-page-subtitle" class="weather-page__subtitle">Прогноз на 7 днів</p>
      </header>
      <div class="weather-page__toolbar">
        <div class="weather-page__search">
          <label for="weather-search-input" class="weather-search-label">Місто чи громада</label>
          <input
            type="search"
            id="weather-search-input"
            class="weather-search-input"
            placeholder="Пошук міста, села, громади…"
            autocomplete="off"
            enterkeyhint="search"
            maxlength="120"
          />
          <div
            id="weather-search-results"
            class="weather-search-results"
            hidden
            role="region"
            aria-label="Результати пошуку місць"
          ></div>
        </div>
        <div class="weather-toolbar-switch" aria-hidden="false">
          <button
            type="button"
            id="weather-locate-btn"
            class="weather-locate-btn btn-bg weather-toolbar-switch__btn"
            title="Погода за моїм місцезнаходженням"
            aria-label="Визначити погоду за моїм місцезнаходженням"
          >
            <span class="weather-locate-btn__icon" aria-hidden="true">📍</span>
            <span class="weather-locate-btn__text">Тут</span>
          </button>
          <button
            type="button"
            id="weather-search-exit-btn"
            class="weather-search-exit-btn weather-toolbar-switch__btn weather-toolbar-switch__btn--hidden"
            title="Закрити пошук"
            aria-label="Закрити пошук населеного пункту"
            tabindex="-1"
          >
            <span class="weather-search-exit-btn__icon" aria-hidden="true">×</span>
          </button>
        </div>
      </div>
      <p id="weather-page-msg" class="weather-page__msg" hidden role="status" aria-live="polite"></p>
      <div id="weather-page-body" class="weather-page__body">
        <p class="weather-page__state" id="weather-page-state">Завантаження…</p>
      </div>
      <div id="weather-search-dim" class="weather-search-dim" aria-hidden="true"></div>
    </section>

    <section id="important-page" class="important-page" hidden aria-label="Важливе повідомлення для студентів">
      <header class="important-page__header">
        <h1 class="important-page__title">Важливо</h1>
        <p class="important-page__lede">Текст показується всім на головному екрані (кнопка «!»). Нижче — збережені раніше версії.</p>
      </header>
      <div class="important-page__editor">
        <label for="important-editor-text" class="important-page__label">Поточне повідомлення</label>
        <textarea
          id="important-editor-text"
          class="important-page__textarea"
          rows="8"
          maxlength="4000"
          placeholder="Важлива інформація для студентів…"
        ></textarea>
        <p id="important-editor-error" class="modal-error important-page__error" hidden></p>
        <button type="button" id="important-editor-save" class="modal-btn modal-btn-primary important-page__save">Зберегти</button>
      </div>
      <section class="important-page__history-block" aria-labelledby="important-history-heading">
        <h2 id="important-history-heading" class="important-page__history-title">Попередні повідомлення</h2>
        <div id="important-history-list" class="important-history-list"></div>
      </section>
    </section>

    <nav id="admin-nav-dock" class="admin-nav-dock" hidden aria-label="Навігація в режимі редагування">
      <button type="button" id="admin-nav-schedule" class="admin-nav-dock__btn" data-admin-nav="schedule">Розклад</button>
      <button type="button" id="admin-nav-birthdays" class="admin-nav-dock__btn" data-admin-nav="birthdays">Дні народження</button>
      <button type="button" id="admin-nav-important" class="admin-nav-dock__btn" data-admin-nav="important">Важливо</button>
    </nav>
  </div>

  <button
    type="button"
    id="reminder-trigger"
    class="reminder-trigger"
    hidden
    aria-label="Важливе нагадування"
    title="Нагадування"
  >
    <span class="reminder-trigger__icon" aria-hidden="true">!</span>
  </button>

  <script src="main.js"></script>
</body>
</html>
